host: PLACEHOLDER_HOST
info:
  contact: {}
  description: A CLI tool and API server for managing LLM resources, containers, and
    RAG pipelines.
  title: llm-manager API
  version: "1.0"
paths:
  /models:
    get:
      consumes:
      - application/json
      description: Returns all LLM models. When OData query parameters are present
        ($filter, $search, $sort, $page, $limit, $fields), returns a wrapped OData
        response with pagination metadata. Without OData params, returns a flat JSON
        array for backward compatibility.
      parameters:
      - description: Filter expression (e.g. 'type eq llm')
        in: query
        name: $filter
        type: string
      - description: Free-text search on name and slug
        in: query
        name: $search
        type: string
      - description: Sort field (e.g. 'name asc')
        in: query
        name: $sort
        type: string
      - description: Page number for pagination
        in: query
        name: $page
        type: integer
      - description: Items per page
        in: query
        name: $limit
        type: integer
      - description: Comma-separated list of fields to include
        in: query
        name: $fields
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OData-wrapped response when OData params present
          schema:
            $ref: '#/definitions/internal_api.ODataListResponse'
        "400":
          description: Invalid query parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List all models
      tags:
      - models
    post:
      consumes:
      - application/json
      description: Creates a new LLM model from a JSON body. The model slug must be
        unique.
      parameters:
      - description: Model object
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_user_llm-manager_internal_database_models.Model'
      produces:
      - application/json
      responses:
        "201":
          description: Created model
          schema:
            $ref: '#/definitions/github_com_user_llm-manager_internal_database_models.Model'
        "400":
          description: Malformed JSON body
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new model
      tags:
      - models
  /models/{slug}:
    delete:
      consumes:
      - application/json
      description: Deletes an LLM model identified by its slug. This is irreversible.
      parameters:
      - description: Model slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content" "Model deleted
        "400":
          description: Missing slug
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Model not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a model
      tags:
      - models
    get:
      consumes:
      - application/json
      description: Returns a single LLM model identified by its slug.
      parameters:
      - description: Model slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Model found
          schema:
            $ref: '#/definitions/github_com_user_llm-manager_internal_database_models.Model'
        "404":
          description: Model not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a model by slug
      tags:
      - models
    put:
      consumes:
      - application/json
      description: Performs a partial update of an existing model identified by its
        slug. Accepts a JSON map of field names to new values.
      parameters:
      - description: Model slug
        in: path
        name: slug
        required: true
        type: string
      - description: Partial update fields
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Updated model
          schema:
            $ref: '#/definitions/github_com_user_llm-manager_internal_database_models.Model'
        "400":
          description: Malformed JSON body or missing slug
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Model not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a model
      tags:
      - models
  /models/{slug}/cache:
    delete:
      consumes:
      - application/json
      description: Removes the HuggingFace model weights cache directory for the specified
        model. This frees disk space but requires re-downloading on next use.
      parameters:
      - description: Model slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: "No Content\"\t\"Cache cleared"
        "400":
          description: Missing slug or model has no HF repo
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Model not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to remove cache directory
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Clear HuggingFace model cache
      tags:
      - models-utilities
  /models/{slug}/compose:
    get:
      description: Generates a Docker Compose YAML configuration for the specified
        LLM model, including container settings, resource allocation, and vLLM engine
        configuration.
      parameters:
      - description: Model slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - text/x-yaml
      responses:
        "200":
          description: Generated docker-compose YAML
          schema:
            type: file
        "400":
          description: Missing slug
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Model not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Compose generation failed
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Generate docker-compose for a model
      tags:
      - models-utilities
  /models/{slug}/export:
    get:
      description: Exports an LLM model from the database as a YAML document suitable
        for re-import to another instance.
      parameters:
      - description: Model slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - text/x-yaml
      responses:
        "200":
          description: YAML export document
          schema:
            type: file
        "400":
          description: Missing slug
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Model not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Export or serialization failed
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Export a model to YAML
      tags:
      - models-utilities
  /models/{slug}/info:
    get:
      description: Returns an LLM model with its JSON string fields (LiteLLMParams,
        ModelInfo, Capabilities) parsed into typed objects.
      parameters:
      - description: Model slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Enriched model details
          schema:
            $ref: '#/definitions/internal_api.ModelInfoResponse'
        "404":
          description: Model not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Enriched model details
      tags:
      - models
  /models/import:
    post:
      consumes:
      - application/json
      - multipart/form-data
      description: Imports an LLM model definition from a YAML file or YAML content.
        Accepts multipart/form-data (file upload) or JSON body with a yaml_content
        field.
      parameters:
      - description: YAML content for import
        in: body
        name: yaml_content
        schema:
          $ref: '#/definitions/internal_api.importRequest'
      - description: YAML file to upload
        in: formData
        name: file
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Imported model
          schema:
            $ref: '#/definitions/github_com_user_llm-manager_internal_database_models.Model'
        "400":
          description: Malformed request or invalid file
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Import a model from YAML
      tags:
      - models-utilities
  /rag:
    get:
      consumes:
      - application/json
      description: Lists all RAG models (embedding and reranker) with their container
        status. When OData query parameters are present, returns a wrapped OData response
        with pagination metadata.
      parameters:
      - description: Filter expression (e.g. 'sub_type eq embedding')
        in: query
        name: $filter
        type: string
      - description: Free-text search on name and slug
        in: query
        name: $search
        type: string
      - description: Sort field (e.g. 'name asc')
        in: query
        name: $sort
        type: string
      - description: Page number for pagination
        in: query
        name: $page
        type: integer
      - description: Items per page
        in: query
        name: $limit
        type: integer
      - description: Comma-separated list of fields to include
        in: query
        name: $fields
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OData-wrapped response when OData params present
          schema:
            $ref: '#/definitions/internal_api.ODataListResponse'
        "400":
          description: Invalid query parameters
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List RAG models
      tags:
      - rag
  /rag/start:
    post:
      consumes:
      - application/json
      description: Starts the embedding and/or reranker container(s) for RAG pipelines.
        If slugs are omitted, starts the first available model of each type.
      parameters:
      - description: Request with embed_slug and/or rerank_slug
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.StartRAGRequest'
      produces:
      - application/json
      responses:
        "200":
          description: List of started model slugs
          schema:
            $ref: '#/definitions/internal_api.StartRAGResponse'
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: No models available or model not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to start container
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Start RAG containers
      tags:
      - rag
  /rag/stop:
    post:
      consumes:
      - application/json
      description: Stops the embedding and/or reranker container(s) for RAG pipelines.
        If both slugs are omitted, stops all running RAG containers.
      parameters:
      - description: Request with embed_slug and/or rerank_slug
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api.StopRAGRequest'
      produces:
      - application/json
      responses:
        "200":
          description: List of stopped model slugs
          schema:
            $ref: '#/definitions/internal_api.StopRAGResponse'
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to stop container
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Stop RAG containers
      tags:
      - rag
swagger: "2.0"
