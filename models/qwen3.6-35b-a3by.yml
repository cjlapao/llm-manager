slug: qwen3.6-27b qwen3.6-35b-a3b
name: "Qwen3.6 35B-A3B"
engine: vllm
hf_repo: "Qwen/Qwen3.6-35B-A3B"
container: llm-qwen3.6-35b-a3b
port: 8026

environment:
  HUGGING_FACE_HUB_TOKEN: "${HF_TOKEN}"
  VLLM_NVFP4_GEMM_BACKEND: marlin
  VLLM_USE_FLASHINFER_MOE_FP4: 0
  VLLM_TEST_FORCE_FP8_MARLIN: 1
  VLLM_LOAD_FORMAT_DEVICE: cuda

command:
  model: "Qwen/Qwen3.6-35B-A3B"
  max-model-len: "262144"
  gpu-memory-utilization: "0.85"
  reasoning-parser: "qwen3"
  tool-call-parser: "qwen3_code"
  enable-auto-tool-choice: "true"
  speculative-config: "{\"method\":\"qwen3_next_mtp\",\"num_speculative_tokens\":2}"

input_token_cost: 0.00000228
output_token_cost: 0.00000456

capabilities:
  - reasoning
  - tool-use
  - multi-turn

litellm_params:
  custom_llm_provider: hosted_vllm
  temperature: 1
  top_p: 0.95
  top_k: 20
  presence_penalty: 1.5
  repetition_penalty: 1
  variants:
    thinking:
      suffix: -thinking
      temperature: 1.0
      top_p: 0.95
      top_k: 20
      presence_penalty: 0.0
      repetition_penalty: 1.0
      extra_body:
        enable_thinking: true
    coder-thinking:
      suffix: -coder-thinking
      temperature: 1
      top_p: 0.95
      top_k: 20
      min_p: 0
      presence_penalty: 1.5
      repetition_penalty: 1.0
      extra_body:
        enable_thinking: true
        output_config:
          effort: "high"
    coder-fast:
      suffix: -coder-fast
      temperature: 0.6
      top_p: 0.9
      top_k: 40
      min_p: 0
      presence_penalty: 0
      repetition_penalty: 1.05
      extra_body:
        enable_thinking: false
    instruct:
      suffix: -instruct
      temperature: 0.7
      top_p: 0.80
      top_k: 20
      presence_penalty: 1.5
      repetition_penalty: 1.0
      extra_body:
        enable_thinking: false
    instruct-reasoning:
      suffix: -instruct-reasoning
      temperature: 1
      top_p: 0.95
      top_k: 20
      presence_penalty: 1.5
      repetition_penalty: 1.0
      extra_body:
        enable_thinking: false
