# ═══════════════════════════════════════════════════════════════
# Qwen3 Embedding 0.6B — FP16
# Target: NVIDIA GB10 DGX Spark (128GB unified LPDDR5x)
# vLLM >= 0.19.0 | SM121 (Blackwell)
# gpu_memory_utilization: 0.05
# ═══════════════════════════════════════════════════════════════

slug: qwen3-embedding-0.6b
name: "Qwen3 Embedding 0.6B"
engine: vllm
engine_version: pgx-llm-v1
hf_repo: "Qwen/Qwen3-Embedding-0.6B"
container: rag-qwen3-embedding-0.6b
port: 8111
type: rag
subtype: embedding

environment:
  VLLM_LOAD_FORMAT_DEVICE: cuda

input_token_cost: 0.00000228
output_token_cost: 0.00000456

profile:
  total_params_b: 0.6
  active_params_b: 0.6
  is_moe: false
  attention_layers: 0
  gdn_layers: 0
  num_kv_heads: 0
  head_dim: 0
  supports_mtp: false
  default_context: 8192
  max_context: 8192
  quant_bytes_per_param: 2.0

command:
  - ${{ .hf_repo }}
  - "--model ${{ .hf_repo }}"
  - "--served-model-name ${{ .slug }}"
  - "--enforce-eager"
  - "--trust-remote-code"

capabilities:
  - embedding
