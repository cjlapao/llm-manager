# ═══════════════════════════════════════════════════════════════
# Qwen3.6 35B-A3B FP8 — FP8
# Target: NVIDIA GB10 DGX Spark (128GB unified LPDDR5x)
# vLLM >= 0.19.0 | SM121 (Blackwell)
# gpu_memory_utilization: 0.45 (~57GB of 128GB)
# ═══════════════════════════════════════════════════════════════

slug: qwen3.6-35b-a3b-fp8
name: "Qwen3.6 35B-A3B FP8"
engine: vllm
engine_version: pgx-llm-v3
hf_repo: "Qwen/Qwen3.6-35B-A3B-FP8"
container: qwen3.6-35b-a3b-fp8
port: 8013
type: llm
subtype: chat

environment:
  VLLM_LOAD_FORMAT_DEVICE: cuda
  VLLM_TEST_FORCE_FP8_MARLIN: 1

input_token_cost: 0.000003
output_token_cost: 0.000015
cache_creation_input_token_cost: 0.00000375
cache_read_input_token_cost: 0.0000003

profile:
  total_params_b: 35
  active_params_b: 3
  is_moe: true
  attention_layers: 10
  gdn_layers: 30
  num_kv_heads: 2
  head_dim: 256
  supports_mtp: true
  default_context: 262144
  max_context: 262144
  quant_bytes_per_param: 1.0
  max_num_seqs: 64
  max_num_batched_tokens: 16384

command:
  - ${{ .hf_repo }}
  - "--model ${{ .hf_repo }}"
  - "--served-model-name ${{ .slug }}"
  - "--kv-cache-dtype fp8"
  - "--dtype auto"
  - "--enable-chunked-prefill"
  - "--reasoning-parser qwen3"
  - "--tool-call-parser qwen3_coder"
  - "--enable-auto-tool-choice"
  - "--enable-prefix-caching"
  - "--trust-remote-code"
  - "--trust-request-chat-template"
  - "--generation-config auto"
  - "--mm-processor-cache-type shm"
  - "--disable-custom-all-reduce"
  - "--enable-expert-parallel"
  - "--mm-encoder-tp-mode data"
  - "--load-format instanttensor"
  - "--chat-template /app/templates/qwen3.6-chat-template.jinja"
  - "--default-chat-template-kwargs '{\"preserve_thinking\": true}'"

capabilities:
  - reasoning
  - tool-use
  - multi-turn
  - image
  - video
  - document

litellm_params:
  custom_llm_provider: hosted_vllm
  temperature: 0.6
  top_p: 0.95
  top_k: 20
  min_p: 0
  presence_penalty: 0.0
  repetition_penalty: 1.0
  extra_body:
    chat_template_kwargs:
      enable_thinking: true
      preserve_thinking: true
  variants:
    thinking:
      suffix: -thinking
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      min_p: 0
      presence_penalty: 0.0
      repetition_penalty: 1.0
      extra_body:
        chat_template_kwargs:
          enable_thinking: true
          preserve_thinking: true
    coder-thinking:
      suffix: -coder-thinking
      temperature: 1.0
      top_p: 0.95
      top_k: 20
      min_p: 0
      presence_penalty: 1.5
      repetition_penalty: 1.0
      extra_body:
        chat_template_kwargs:
          enable_thinking: true
          preserve_thinking: true
    coder-fast:
      suffix: -coder-fast
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      min_p: 0
      presence_penalty: 0.0
      repetition_penalty: 1.05
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
          preserve_thinking: false
    instruct:
      suffix: -instruct
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      min_p: 0
      presence_penalty: 0.0
      repetition_penalty: 1.0
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
          preserve_thinking: false
    instruct-reasoning:
      suffix: -instruct-reasoning
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      min_p: 0
      presence_penalty: 0.0
      repetition_penalty: 1.0
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
          preserve_thinking: false
