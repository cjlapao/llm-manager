# ═══════════════════════════════════════════════════════════════
# Qwen3.6 35B-A3B FP8 — FP8
# Target: NVIDIA GB10 DGX Spark (128GB unified LPDDR5x)
# vLLM >= 0.19.0 | SM121 (Blackwell)
# gpu_memory_utilization: 0.45 (~57GB of 128GB)
# ═══════════════════════════════════════════════════════════════

slug: qwen3.6-35b-a3b-fp8
name: "Qwen3.6 35B-A3B FP8"
engine: vllm
engine_version: pgx-llm-v1
hf_repo: "Qwen/Qwen3.6-35B-A3B-FP8"
container: llm-qwen3.6-35b-a3b-fp8
port: 8013
type: llm
subtype: chat

environment:
  VLLM_LOAD_FORMAT_DEVICE: cuda
  VLLM_TEST_FORCE_FP8_MARLIN: 1

input_token_cost: 0.00000228
output_token_cost: 0.00000456

command:
  - ${{ .hf_repo }}
  - "--model ${{ .hf_repo }}"
  - "--served-model-name ${{ .slug }}"
  - "--max-model-len 262144"
  - "--kv-cache-dtype fp8_e4m3"
  - "--dtype auto"
  - "--gpu-memory-utilization 0.42"
  - "--enable-chunked-prefill"
  - "--max-num-batched-tokens 32768"
  - "--max-num-seqs 4"
  - "--reasoning-parser qwen3"
  - "--tool-call-parser qwen3_coder"
  - "--enable-auto-tool-choice"
  - "--enable-prefix-caching"
  - "--trust-remote-code"
  - "--trust-request-chat-template"
  - "--generation-config auto"
  - "--mm-processor-cache-type shm"
  - "--disable-custom-all-reduce"
  - "--enable-expert-parallel"
  - "--mm-encoder-tp-mode data"
  - "--attention-backend flashinfer"
  - "--moe-backend marlin"
  - "--load-format instanttensor"
  - "--chat-template /app/templates/qwen3.5-chat-template.jinja"
  - 
capabilities:
  - reasoning
  - tool-use
  - multi-turn
  - image
  - video
  - document

litellm_params:
  custom_llm_provider: hosted_vllm
  temperature: 0.6
  top_p: 0.95
  top_k: 20
  min_p: 0
  presence_penalty: 0.0
  repetition_penalty: 1.0
  extra_body:
    chat_template_kwargs:
      enable_thinking: true
      preserve_thinking: true
  variants:
    thinking:
      suffix: -thinking
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      min_p: 0
      presence_penalty: 0.0
      repetition_penalty: 1.0
      extra_body:
        chat_template_kwargs:
          enable_thinking: true
          preserve_thinking: true
    coder-thinking:
      suffix: -coder-thinking
      temperature: 1.0
      top_p: 0.95
      top_k: 20
      min_p: 0
      presence_penalty: 1.5
      repetition_penalty: 1.0
      extra_body:
        chat_template_kwargs:
          enable_thinking: true
          preserve_thinking: true
    coder-fast:
      suffix: -coder-fast
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      min_p: 0
      presence_penalty: 0.0
      repetition_penalty: 1.05
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
          preserve_thinking: false
    instruct:
      suffix: -instruct
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      min_p: 0
      presence_penalty: 0.0
      repetition_penalty: 1.0
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
          preserve_thinking: false
    instruct-reasoning:
      suffix: -instruct-reasoning
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      min_p: 0
      presence_penalty: 0.0
      repetition_penalty: 1.0
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
          preserve_thinking: false
