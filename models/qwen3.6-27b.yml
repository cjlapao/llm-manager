slug: qwen3.6-27b
name: "Qwen3.6 27B"
engine: vllm
hf_repo: "Qwen/Qwen3.6-27B"
container: llm-qwen3.6-27b
port: 8028

environment:
  VLLM_HOST: "0.0.0.0"
  HF_TOKEN: "${HF_TOKEN}"

command:
  model: "Qwen/Qwen3.6-27B"
  max-model-len: "262144"
  gpu-memory-utilization: "0.85"
  reasoning-parser: "qwen3"
  tool-call-parser: "qwen3_code"
  enable-auto-tool-choice: "true"
  speculative-config: '{"method":"qwen3_next_mtp","num_speculative_tokens":2}'
input_token_cost: 0.00000228
output_token_cost: 0.00000456

capabilities:
  - reasoning
  - tool-use
  - multi-turn

litellm_params:
  custom_llm_provider: hosted_vllm
  temperature: 1.0
  top_p: 0.95
  top_k: 20
  presence_penalty: 1.5
  repetition_penalty: 1.0
  extra_body:
    chat_template_kwargs:
      enable_thinking: false
  variants:
    thinking:
      suffix: -thinking
      temperature: 1.0
      top_p: 0.95
      top_k: 20
      presence_penalty: 0.0
      repetition_penalty: 1.0
      extra_body:
        enable_thinking: true
    coder:
      suffix: -coder
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      presence_penalty: 0.0
      repetition_penalty: 1.0
      extra_body:
        enable_thinking: true
    instruct:
      suffix: -instruct
      temperature: 0.7
      top_p: 0.80
      top_k: 20
      presence_penalty: 1.5
      repetition_penalty: 1.0
      extra_body:
        enable_thinking: false

