# ═══════════════════════════════════════════════════════════════
# Ornith 1.0 35B-A3B FP8 — FP8 (Qwen3.5-MoE base, multimodal)
# Target: NVIDIA GB10 DGX Spark (128GB unified LPDDR5x)
# vLLM >= 0.19.1 | SM121 (Blackwell)
# gpu_memory_utilization: 0.45 (~57GB of 128GB)
# Reasoning + agentic-coding model. Vision + video heads present.
# ═══════════════════════════════════════════════════════════════

slug: ornith-1.0-35b-a3b-fp8
name: "Ornith 1.0 35B-A3B FP8"
engine: vllm
engine_version: v4
hf_repo: "deepreinforce-ai/Ornith-1.0-35B-FP8"
container: ornith-1.0-35b-a3b-fp8
port: 8041
type: llm
subtype: chat

environment:
  VLLM_LOAD_FORMAT_DEVICE: cuda

input_token_cost: 0.000003
output_token_cost: 0.000015
cache_creation_input_token_cost: 0.00000375
cache_read_input_token_cost: 0.0000003

profile:
  total_params_b: 35
  active_params_b: 3
  is_moe: true
  num_experts: 256
  num_experts_per_tok: 8
  attention_layers: 10        # full_attention layers (every 4th of 40)
  gdn_layers: 30              # linear_attention layers
  num_kv_heads: 2
  num_attention_heads: 16
  head_dim: 256
  partial_rotary_factor: 0.25
  supports_mtp: true          # mtp_num_hidden_layers: 1
  default_context: 262144
  max_context: 262144
  quant_bytes_per_param: 1.0
  max_num_seqs: 8
  max_num_batched_tokens: 8192
  speculative_decoding: dflash
  speculative_model: z-lab/Qwen3.6-27B-DFlash

command:
  - ${{ .hf_repo }}
  - "--model ${{ .hf_repo }}"
  - "--served-model-name ${{ .slug }}"
  - "--kv-cache-dtype fp8"
  - "--dtype auto"
  - "--max-model-len 262144"
  - "--enable-chunked-prefill"
  - "--reasoning-parser qwen3"
  - "--tool-call-parser qwen3_xml"
  - "--enable-auto-tool-choice"
  - "--enable-prefix-caching"
  - "--trust-remote-code"
  - "--trust-request-chat-template"
  - "--generation-config auto"
  - "--mm-processor-cache-type shm"
  - "--disable-custom-all-reduce"
  - "--enable-expert-parallel"
  - "--mm-encoder-tp-mode data"
  - "--load-format instanttensor"
  - "--attention-backend flashinfer"
  - "--moe-backend marlin"
  - "--default-chat-template-kwargs '{\"preserve_thinking\": true}'"

capabilities:
  - reasoning
  - tool-use
  - multi-turn
  - image
  - video
  - document

litellm_params:
  custom_llm_provider: hosted_vllm
  temperature: 0.6
  top_p: 0.95
  top_k: 20
  min_p: 0
  presence_penalty: 0.0
  repetition_penalty: 1.0
  extra_body:
    chat_template_kwargs:
      enable_thinking: true
      preserve_thinking: true
  variants:
    thinking:
      suffix: -thinking
      temperature: 0.6
      top_p: 0.95
      top_k: 20
      min_p: 0
      presence_penalty: 0.0
      repetition_penalty: 1.0
      extra_body:
        chat_template_kwargs:
          enable_thinking: true
          preserve_thinking: true
    # Agentic/terminal-bench recipe from the model card runs hotter.
    coder-thinking:
      suffix: -coder-thinking
      temperature: 1.0
      top_p: 1.0
      top_k: 20
      min_p: 0
      presence_penalty: 0.0
      repetition_penalty: 1.0
      extra_body:
        chat_template_kwargs:
          enable_thinking: true
          preserve_thinking: true
    # SWE-Bench / OpenHands recipe: temp 1.0, top_p 0.95.
    coder-fast:
      suffix: -coder-fast
      temperature: 1.0
      top_p: 0.95
      top_k: 20
      min_p: 0
      presence_penalty: 0.0
      repetition_penalty: 1.0
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
          preserve_thinking: false
    instruct:
      suffix: -instruct
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      min_p: 0
      presence_penalty: 0.0
      repetition_penalty: 1.0
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
          preserve_thinking: false
