engine:
  slug: vllm
  name: vLLM
  description: "vLLM high-throughput inference engine"

versions:
  - slug: pgx-llm-v1
    version: "001"
    container_name: vllm-node
    image: cjlapao/pgx-vllm-gb10-nvfp4:230426
    entrypoint:
      - python3
      - -m
      - vllm.entrypoints.openai.api_server
    default: true
    latest: true
    volumes:
      ../models: "/root/.cache/huggingface"
      ../vllm-cache: "/root/.cache/vllm"
      ../llm-templates: "/app/templates"
      ../triton-cache: "/root/.cache/triton"
      ../flashinfer-cache: "/root/.cache/flashinfer"
    environment:
      HF_HUB_OFFLINE: "0"
      VLLM_LOAD_FORMAT_DEVICE: cuda
      VLLM_NVFP4_GEMM_BACKEND: marlin
      VLLM_USE_FLASHINFER_MOE_FP4: "0"
      VLLM_TEST_FORCE_FP8_MARLIN: "1"
    logging:
      enable: true
      address: "udp://127.0.0.1:514"
      facility: local3
    nvidia: true
    gpu_count: all
    command_args:
      - --tensor-parallel-size
      - "{{.GPU_COUNT}}"
    port: 8000
