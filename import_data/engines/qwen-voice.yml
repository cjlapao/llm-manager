engine:
  slug: qwen3-voice
  name: Qwen3 Voice
  description: "Qwen3 Voice custom engine for TTS and ASR"
  provider: custom

versions:
  - slug: v1
    version: "1"
    container_name: speech-node
    image: ghcr.io/cjlapao/qwen3-audio-gb10:0.1.0
    default: true
    latest: true
    volumes:
      ../models: "/models"
      ../voices: "/app/voices"
    environment:
      VLLM_LOAD_FORMAT_DEVICE: cuda
      HF_HOME: /models
    logging:
      enable: true
      address: "udp://127.0.0.1:514"
      facility: local3
    nvidia: true
    gpu_count: all
    port: 8000
